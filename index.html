<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Worksheets</title>
<style>
  body { font-family: Arial, sans-serif; color: #000; background: #fff;
         max-width: 640px; margin: 40px auto; padding: 0 16px; }
  input, button { font-family: Arial, sans-serif; font-size: 16px; padding: 6px; }
  input { border: 1px solid #000; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
  button { border: 1px solid #000; background: #fff; cursor: pointer; }
  ul { padding-left: 20px; }
  li { margin-bottom: 8px; }
  .err { border: 1px solid #000; padding: 8px; margin-top: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>Worksheets</h1>

<!-- Login form -->
<div id="loginBox" class="hidden">
  <p>Log in with the email and password your tutor gave you.</p>
  <input id="email" type="email" placeholder="Email" autocomplete="username">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password">
  <button onclick="doLogin()">Log in</button>
  <div id="loginErr" class="err hidden"></div>
</div>

<!-- Worksheet list -->
<div id="listBox" class="hidden">
  <p>Logged in as <span id="who"></span>. <button onclick="logout()">Log out</button></p>
  <p id="teacherLink" class="hidden"><a href="teacher.html">Teacher view →</a></p>
  <h2>Your worksheets</h2>
  <ul id="wsList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="config.js"></script>
<script src="worksheets.js"></script>
<script>
auth.onAuthStateChanged(function (user) {
  document.getElementById("loginBox").classList.toggle("hidden", !!user);
  document.getElementById("listBox").classList.toggle("hidden", !user);
  if (!user) return;

  document.getElementById("who").textContent = user.email;
  if (user.email === TEACHER_EMAIL) {
    document.getElementById("teacherLink").classList.remove("hidden");
  }

  var ul = document.getElementById("wsList");
  ul.innerHTML = "";
  Object.keys(WORKSHEETS).forEach(function (id) {
    var li = document.createElement("li");
    var a = document.createElement("a");
    a.href = "worksheet.html?id=" + id;
    a.textContent = WORKSHEETS[id].title;
    li.appendChild(a);
    ul.appendChild(li);
  });
});

function doLogin() {
  var errBox = document.getElementById("loginErr");
  errBox.classList.add("hidden");
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value.trim(),
    document.getElementById("password").value
  ).catch(function (e) {
    errBox.textContent = "Login failed: " + e.message;
    errBox.classList.remove("hidden");
  });
}
document.getElementById("password").addEventListener("keydown", function (e) {
  if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
